name: Daemon integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: daemon-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Seoul

jobs:
  omp-shared-daemon:
    name: OMP shared daemon and worktrees
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build OMP integration image
        run: docker build -f tests/docker/Dockerfile.omp -t pi-codegraph-omp-integration .
      - name: Test shared daemon
        run: >-
          docker run --rm
          pi-codegraph-omp-integration
          bun tests/shared-daemon-docker.integration.ts

  pi:
    name: Pi extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Test Pi extension
        run: docker build -f tests/docker/Dockerfile.pi .
