name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.19.0, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check formatting and lint
        run: npm run check
      - name: Type-check
        run: npm run typecheck
      - name: Build and run unit tests
        run: npm test
      - name: Audit production dependencies
        run: npm audit --omit=dev

  omp-integration:
    name: OMP Docker integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Build isolated OMP test image
        run: docker build --file tests/docker/Dockerfile.omp --tag pi-codegraph-omp-integration .
      - name: Exercise every CodeGraph tool through OMP
        run: docker run --rm pi-codegraph-omp-integration
